global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: fastapi_api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: fastapi

  - job_name: postgresql_exporter
    static_configs:
      - targets: ["postgres_exporter:9187"]
        labels:
          service: postgresql

  - job_name: docker_stats_exporter
    static_configs:
      - targets: ["docker_stats_exporter:9417"]
        labels:
          service: docker
