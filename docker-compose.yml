# Production: 2 containers only (api + db). No reload, no host mount.
# Run: docker compose up -d --build

name: fastapi

services:
  db:
    image: postgres:16-alpine
    container_name: fastapi_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-appsecret}
      POSTGRES_DB: ${POSTGRES_DB:-fastapi_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-fastapi_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fastapi_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      USE_MEMORY_STORE: "false"
      HOST: 0.0.0.0
      PORT: 8000
      POSTGRES_HOST: db
    ports:
      - "8080:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
