# Separate PostgreSQL instance for tests only (Lab 6).
# Production DB: fastapi_postgres:5432 / fastapi_db
# Test DB:       fastapi_postgres_test:5433 / fastapi_test_db
#
# Run: docker compose -f docker-compose.test.yml up -d

name: fastapi-test

services:
  test_db:
    image: postgres:16-alpine
    container_name: fastapi_postgres_test
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-appsecret}
      POSTGRES_DB: ${POSTGRES_TEST_DB:-fastapi_test_db}
    ports:
      - "${POSTGRES_TEST_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_TEST_DB:-fastapi_test_db}"]
      interval: 3s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_test_data:/var/lib/postgresql/data

volumes:
  postgres_test_data:
