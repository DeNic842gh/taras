# Development override: same 2 containers, adds --reload + volume mount.
# Run: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build
# (Stop production first: docker compose down)

services:
  api:
    restart: "no"
    environment:
      APP_ENV: development
      APP_DEBUG: "true"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: >
      sh -c "poetry install --only main --no-interaction
      && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
