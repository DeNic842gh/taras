# Development override: same 2 containers, adds --reload + volume mount.
# Run: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build

services:
  api:
    restart: "no"
    environment:
      APP_ENV: development
      APP_DEBUG: "true"
      USE_MEMORY_STORE: "true"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: >
      sh -c "poetry install --only main --no-interaction
      && python main.py"
